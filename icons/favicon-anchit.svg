<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1A15"/>
      <stop offset="100%" stop-color="#0D0B09"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg2)"/>
  <!-- Large italic A, coral, anchors the mark -->
  <text x="256" y="308"
        font-family="Georgia,'Times New Roman',serif"
        font-size="300" font-weight="700" font-style="italic"
        fill="#FF4D1F" text-anchor="middle"
        letter-spacing="-14">A</text>
  <!-- NCHIT in mono, cream, small — baseline below the A -->
  <text x="302" y="370"
        font-family="'Courier New',Courier,monospace"
        font-size="72" font-weight="400"
        fill="#F5EFE3" text-anchor="middle"
        letter-spacing="14">NCHIT</text>
  <!-- Coral rule underline -->
  <rect x="80" y="390" width="352" height="5" rx="2.5" fill="#FF4D1F" opacity="0.8"/>
</svg>
